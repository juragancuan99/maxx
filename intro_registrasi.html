<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        /* Menyembunyikan scrollbar di area slide agar tampak bersih */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Nonaktifkan smooth-scroll sesaat saat melompat antar clone, supaya loop tidak terlihat "patah" */
        .no-smooth { scroll-behavior: auto !important; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D4FF00',
                    }
                }
            }
        }
    </script>

</head>

<body class="h-screen w-screen overflow-hidden bg-white">
    <div class="w-full h-full bg-white overflow-y-auto relative flex flex-col font-sans">
        
        <div class="relative w-full h-[55%] bg-indigo-50 rounded-b-[3rem] overflow-hidden shrink-0">
            <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-[#4F46E5] opacity-10 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute top-[30%] right-[-20%] w-64 h-64 bg-purple-400 opacity-10 rounded-full blur-3xl pointer-events-none"></div>

            <!-- Tombol panah kiri/kanan supaya bisa digeser terus-menerus -->
            <button id="prevBtn" aria-label="Sebelumnya" class="absolute left-3 top-1/2 -translate-y-1/2 z-20 w-9 h-9 rounded-full bg-white/80 backdrop-blur shadow-md flex items-center justify-center text-gray-600 hover:text-[#00a6a6] active:scale-95 transition-all">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <button id="nextBtn" aria-label="Berikutnya" class="absolute right-3 top-1/2 -translate-y-1/2 z-20 w-9 h-9 rounded-full bg-white/80 backdrop-blur shadow-md flex items-center justify-center text-gray-600 hover:text-[#00a6a6] active:scale-95 transition-all">
                <i class="fa-solid fa-chevron-right text-sm"></i>
            </button>

            <div id="slider" class="w-full h-full flex overflow-x-auto snap-x snap-mandatory scroll-smooth no-scrollbar">
                <!-- Slide-slide asli & clone akan disisipkan lewat JavaScript di bawah -->
            </div>

            <div class="absolute bottom-6 right-8 bg-white p-3 rounded-2xl shadow-xl z-20 animate-bounce" style="animation-duration: 3s;">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600">
                        <i class="fa-solid fa-gift text-lg"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 font-medium">Cashback &amp;</p>
                        <p class="text-sm font-bold text-gray-800">Misi Reward</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center px-8 pt-8 pb-8">
            
            <div class="flex space-x-2 mb-8" id="pagination-dots">
                <div class="dot w-8 h-2 bg-[#00a6a6] rounded-full transition-all duration-300"></div>
                <div class="dot w-2 h-2 bg-gray-200 rounded-full transition-all duration-300"></div>
               
            </div>

            <div class="text-center mb-6">
                <h1 class="text-3xl font-extrabold text-gray-900 mb-4 tracking-tight">
                    Selamat Datang di <br>
                    <span class="text-[#00a6a6]">MAXI Affiliate</span>
                </h1>
                <p class="text-gray-500 text-base leading-relaxed px-2">
                    Nikmati ribuan keuntungan, Diskon Belanja, Cashback dan Reward melimpah dari setiap transaksi yang anda lakukan.
                </p>
            </div>

            <div class="grid grid-cols-3 gap-4 w-full mb-auto mt-2">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-[#00a6a6]">
                        <i class="fa-solid fa-tags text-lg"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-600">Diskon</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-[#00a6a6]">
                        <i class="fa-solid fa-coins text-lg"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-600">Cashback</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-[#00a6a6]">
                        <i class="fa-solid fa-crown text-lg"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-600">Reward</span>
                </div>
            </div>

           <button onClick="location.href='login.html';" class="group w-full bg-[#00a6a6] hover:bg-cyan-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-indigo-200 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3 mt-6">
                <span>Mulai Sekarang</span>
            </button>
        </div>
    </div>

    <script>
        // ---- Daftar gambar asli slide ----
        const images = [
            { src: 'images/intro1.png', alt: 'Friends celebrating 1' },
            { src: 'images/intro2.png', alt: 'Friends celebrating 3' }
        ];
        const n = images.length;

        const slider = document.getElementById('slider');
        const dotsContainer = document.getElementById('pagination-dots');

        // Bangun markup satu slide
        function slideHTML(img) {
            return `
                <div class="slide w-full h-full shrink-0 snap-start relative flex items-end justify-center pb-4">
                    <img
                        style="mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);"
                        class="w-full h-full object-cover object-top opacity-90 mix-blend-multiply"
                        alt="${img.alt}"
                        src="${img.src}">
                </div>`;
        }

        // ---- Susun slide dengan clone di awal & akhir agar loop terlihat mulus ----
        // Urutan: [clone slide terakhir, slide 1, slide 2, ..., slide n, clone slide 1]
        const track = [images[n - 1], ...images, images[0]];
        slider.innerHTML = track.map(slideHTML).join('');

        // Bangun titik pagination sesuai jumlah slide asli
        dotsContainer.innerHTML = images.map((_, i) =>
            `<div class="dot ${i === 0 ? 'w-8 bg-[#00a6a6]' : 'w-2 bg-gray-200'} h-2 rounded-full transition-all duration-300"></div>`
        ).join('');
        const dots = dotsContainer.querySelectorAll('.dot');

        function setActiveDot(realIndex) {
            dots.forEach((dot, i) => {
                if (i === realIndex) {
                    dot.classList.remove('w-2', 'bg-gray-200');
                    dot.classList.add('w-8', 'bg-[#00a6a6]');
                } else {
                    dot.classList.remove('w-8', 'bg-[#00a6a6]');
                    dot.classList.add('w-2', 'bg-gray-200');
                }
            });
        }

        // Posisi awal: index 1 di track (= slide asli pertama), tanpa animasi
        let slideWidth = slider.clientWidth;
        function jumpTo(trackIndex, smooth = false) {
            slider.scrollTo({ left: trackIndex * slideWidth, behavior: smooth ? 'smooth' : 'auto' });
        }
        jumpTo(1, false);

        let currentTrackIndex = 1;
        let isJumping = false;

        function goTo(trackIndex, smooth = true) {
            currentTrackIndex = trackIndex;
            slideWidth = slider.clientWidth;
            jumpTo(trackIndex, smooth);
        }

        document.getElementById('nextBtn').addEventListener('click', () => goTo(currentTrackIndex + 1));
        document.getElementById('prevBtn').addEventListener('click', () => goTo(currentTrackIndex - 1));

        // Deteksi akhir scroll (swipe manual maupun tombol), lalu tentukan slide aktif
        let scrollEndTimer;
        slider.addEventListener('scroll', () => {
            clearTimeout(scrollEndTimer);
            scrollEndTimer = setTimeout(onScrollEnd, 90);
        });

        function onScrollEnd() {
            if (isJumping) return;
            slideWidth = slider.clientWidth;
            const trackIndex = Math.round(slider.scrollLeft / slideWidth);
            currentTrackIndex = trackIndex;

            if (trackIndex === 0) {
                // Berada di clone slide terakhir -> lompat diam-diam ke slide asli terakhir
                isJumping = true;
                slider.classList.add('no-smooth');
                requestAnimationFrame(() => {
                    jumpTo(n, false);
                    currentTrackIndex = n;
                    setActiveDot(n - 1);
                    slider.classList.remove('no-smooth');
                    isJumping = false;
                });
            } else if (trackIndex === n + 1) {
                // Berada di clone slide pertama -> lompat diam-diam ke slide asli pertama
                isJumping = true;
                slider.classList.add('no-smooth');
                requestAnimationFrame(() => {
                    jumpTo(1, false);
                    currentTrackIndex = 1;
                    setActiveDot(0);
                    slider.classList.remove('no-smooth');
                    isJumping = false;
                });
            } else {
                setActiveDot(trackIndex - 1);
            }
        }

        // Jaga posisi tetap benar saat ukuran layar berubah (misal rotasi layar)
        window.addEventListener('resize', () => {
            slideWidth = slider.clientWidth;
            jumpTo(currentTrackIndex, false);
        });
    </script>

</body>
</html>
