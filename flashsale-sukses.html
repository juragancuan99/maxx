<html lang="id"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Pendapatan - Maxi Affiliate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; } 
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-active { background-color: #FF5722 !important; color: white !important; shadow-sm: shadow-orange-200; }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#D4FF00' } } } }
    </script>

</head>
<body class="h-screen w-screen overflow-hidden bg-white">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  
  .font-inter { font-family: 'Inter', sans-serif; }
  
  @keyframes confetti-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: confetti-fall 4s linear infinite;
    z-index: 0;
  }

  @keyframes pop-in {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .animate-pop {
    animation: pop-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes slide-up {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .animate-slide-up {
    animation: slide-up 0.6s ease-out forwards;
    opacity: 0;
  }
  
  .delay-100 { animation-delay: 0.1s; }
  .delay-200 { animation-delay: 0.2s; }
  .delay-300 { animation-delay: 0.3s; }
</style>

<div class="w-full h-full bg-white overflow-y-auto relative font-inter text-gray-800">
  
  <!-- Confetti Background Elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="confetti bg-red-400 left-[10%]" style="animation-delay: 0s; animation-duration: 3.5s;"></div>
    <div class="confetti bg-blue-400 left-[20%]" style="animation-delay: 1s; animation-duration: 4s;"></div>
    <div class="confetti bg-yellow-400 left-[30%]" style="animation-delay: 2.5s; animation-duration: 3s;"></div>
    <div class="confetti bg-green-400 left-[40%]" style="animation-delay: 0.5s; animation-duration: 4.5s;"></div>
    <div class="confetti bg-purple-400 left-[50%]" style="animation-delay: 1.5s; animation-duration: 3.2s;"></div>
    <div class="confetti bg-pink-400 left-[60%]" style="animation-delay: 3s; animation-duration: 3.8s;"></div>
    <div class="confetti bg-[#2962FF] left-[70%]" style="animation-delay: 0.2s; animation-duration: 4.2s;"></div>
    <div class="confetti bg-orange-400 left-[80%]" style="animation-delay: 1.8s; animation-duration: 3.6s;"></div>
    <div class="confetti bg-teal-400 left-[90%]" style="animation-delay: 2.2s; animation-duration: 4.1s;"></div>
    <!-- More density -->
    <div class="confetti bg-yellow-500 left-[15%]" style="animation-delay: 1.2s; animation-duration: 3.3s;"></div>
    <div class="confetti bg-[#2962FF] left-[85%]" style="animation-delay: 0.8s; animation-duration: 3.9s;"></div>
  </div>

  <!-- Main Content -->
  <div class="relative z-10 flex flex-col items-center justify-center min-h-full p-6 pb-10">
    
    <!-- Success Badge Animation -->
    <div class="relative mb-8 animate-pop">
      <!-- Glow effect -->
      <div class="absolute inset-0 bg-yellow-200 rounded-full blur-xl opacity-50 animate-pulse"></div>
      
      <!-- Icon Container -->
      <div class="relative w-32 h-32 bg-gradient-to-br from-yellow-50 to-yellow-100 rounded-full flex items-center justify-center shadow-xl border-4 border-white ring-4 ring-yellow-50">
        <i class="fa-solid fa-medal text-6xl text-yellow-500 drop-shadow-sm"></i>
        
        <!-- Small star decorations on the badge -->
        <i class="fa-solid fa-star text-yellow-400 absolute top-4 right-6 text-sm animate-bounce" style="animation-duration: 2s;"></i>
        <i class="fa-solid fa-star text-yellow-400 absolute bottom-6 left-6 text-xs animate-bounce" style="animation-duration: 2.5s;"></i>
      </div>
    </div>

    <!-- Text Content -->
    <div class="text-center mb-10 animate-slide-up delay-100">
      <h1 class="text-3xl font-bold text-gray-900 mb-2 tracking-tight">Selamat!</h1>
      <p class="text-gray-500 text-lg leading-relaxed">Anda Berhasil Membeli Hadiah<br>
        <span class="font-semibold text-gray-800">MOBIL HONDA BRIO</span> <br>
      </p><div class="px-4 mt-[0rem]">
        <div class="bg-yellow-50 border border-[#FFD700]/30 rounded-lg p-3 flex items-center gap-3 shadow-sm">
            
            <p class="text-[0.8rem] text-slate-700 font-medium leading-snug">Hadiah Akan Segera Di Proses..!</p>
        </div>
    </div><p></p>
    </div>

    <!-- Benefits Card -->
    

    <img src="images/brio2.png" alt="Honda Brio" class="w-[20rem h-64 object-cover rounded-3xl mx-auto block"><!-- Action Button -->
    <div class="w-full max-w-sm animate-slide-up delay-300 mt-auto">
      <button onclick="window.location.href='pembayaran-flashsale-lacak.html'" class="w-full bg-[#FF5722] hover:bg-[#FF5722] text-white font-semibold py-4 px-6 rounded-xl shadow-lg shadow-blue-500/30 transition-all transform active:scale-95 flex items-center justify-center gap-2 group">
        <span>Lihat Pesanan</span>
        
      </button>
      <button class="w-full mt-4 text-gray-400 text-sm font-medium py-2 hover:text-gray-600 transition-colors">Beranda</button>
    </div>

  </div>
</div>
        
      
    </body></html>
