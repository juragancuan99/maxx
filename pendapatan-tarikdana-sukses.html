<html lang="id"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Penarikan Dana - Maxi Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        body { font-family: 'Inter', sans-serif; }
    </style>

</head>
<body class="h-screen w-screen overflow-hidden bg-white">
          <div class="w-full h-full bg-white overflow-y-auto relative font-sans flex flex-col">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Confetti / Decoration Background -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <!-- Top Left Cluster -->
        <div class="absolute top-10 left-4 w-3 h-3 bg-yellow-400 rounded-full opacity-80 animate-bounce" style="animation-duration: 2s;"></div>
        <div class="absolute top-20 left-10 w-4 h-1 bg-red-400 rotate-45 opacity-80"></div>
        <div class="absolute top-12 left-20 w-2 h-2 bg-blue-400 rounded-sm rotate-12 opacity-80"></div>
        
        <!-- Top Right Cluster -->
        <div class="absolute top-8 right-8 w-3 h-3 bg-purple-400 rounded-full opacity-80 animate-pulse"></div>
        <div class="absolute top-24 right-12 w-4 h-1 bg-green-400 -rotate-45 opacity-80"></div>
        <div class="absolute top-16 right-24 w-2 h-2 bg-pink-400 rounded-sm rotate-12 opacity-80"></div>

        <!-- Floating shapes -->
        <svg class="absolute top-1/4 left-8 text-indigo-100 w-12 h-12 animate-spin" style="animation-duration: 10s;" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z"></path></svg>
        <svg class="absolute bottom-1/3 right-4 text-yellow-100 w-16 h-16" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 flex-1 flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto">
        
        <!-- Success Animation Wrapper -->
        <div class="mb-8 relative">
            <div class="absolute inset-0 bg-green-100 rounded-full animate-ping opacity-75"></div>
            <div class="relative w-28 h-28 bg-green-100 rounded-full flex items-center justify-center shadow-sm">
                <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-200">
                    <i class="fas fa-check text-4xl text-white"></i>
                </div>
            </div>
        </div>

        <!-- Header Text -->
        <h1 class="text-2xl font-bold text-gray-900 text-center mb-2 leading-tight">
            Selamat! Dana Berhasil Dicairkan
        </h1>
        <p class="text-gray-500 text-center text-sm mb-8 px-4">
            Permintaan penarikan dana Anda telah diproses dan saldo telah dikirim.
        </p>

        <!-- Transaction Receipt Card -->
        <div class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-6 shadow-sm relative overflow-hidden">
            <!-- Decorative top border -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-400 to-purple-500"></div>

            <div class="text-center mb-6">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Jumlah Penarikan</p>
                <h2 class="text-3xl font-extrabold text-gray-900">Rp 150.000.000</h2>
            </div>

            <!-- Divider -->
            <div class="w-full border-t border-dashed border-gray-300 my-4 relative">
                <div class="absolute -left-8 -top-3 w-6 h-6 bg-white rounded-full"></div>
                <div class="absolute -right-8 -top-3 w-6 h-6 bg-white rounded-full"></div>
            </div>

            <!-- Details -->
            <div class="space-y-3 text-sm">
                <div class="flex justify-between items-center">
                    <span class="text-gray-500">Metode</span>
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-[10px]">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <span class="font-semibold text-gray-800">GoPay</span>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-500">Nomor Tujuan</span>
                    <span class="font-semibold text-gray-800">0812xxx8890</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-500">Tanggal</span>
                    <span class="font-semibold text-gray-800">16 Juli 2026</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-500">Waktu</span>
                    <span class="font-semibold text-gray-800">16:18 WIB</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-500">ID Transaksi</span>
                    <span class="font-mono text-xs text-gray-600 bg-gray-200 px-2 py-1 rounded">TRX-992831</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Action -->
    <div class="relative z-10 p-6 bg-white w-full max-w-md mx-auto">
        <button onclick="window.location.href='index.html'" class="w-full text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-200 hover:opacity-90 transition-all active:scale-[0.98] flex items-center justify-center gap-2" style="background-color: #00a6a6;">
            <span>Kembali ke Beranda</span>
        </button>
        
        <button onclick="window.location.href='historybonus.html'" class="w-full mt-3 text-gray-500 font-medium py-3 rounded-xl hover:bg-gray-50 transition-colors text-sm">
            Lihat Riwayat Transaksi
        </button>
    </div>
</div>
       

</body></html>
