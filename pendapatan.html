<script>
    function animateCounter() {
        const counter = document.getElementById('counter');
        const target = parseInt(counter.getAttribute('data-target'));
        const duration = 2000; // Durasi animasi dalam milidetik (2 detik)
        const frameRate = 60; // Frame per detik
        const totalFrames = Math.round(duration / 1000 * frameRate);
        const increment = target / totalFrames;

        let current = 0;
        
        const update = () => {
            current += increment;
            if (current < target) {
                // Memformat angka dengan pemisah ribuan
                counter.innerText = Math.floor(current).toLocaleString('id-ID');
                requestAnimationFrame(update);
            } else {
                counter.innerText = target.toLocaleString('id-ID');
            }
        };
        
        update();
    }

    // Jalankan fungsi saat halaman selesai dimuat
    window.addEventListener('DOMContentLoaded', animateCounter);
</script>

    function setActiveMenu() {
        // Ambil nama file dari URL (contoh: 'misireward.html')
        const path = window.location.pathname.split("/").pop() || 'index.html';
        
        // Pemetaan path ke ID menu
        const menuMap = {
            'index.html': 'nav-beranda',
            'misireward.html': 'nav-misi',
            'team.html': 'nav-team',
            'pendapatan.html': 'nav-pendapatan',
            'saya.html': 'nav-saya'
        };

        const activeId = menuMap[path];
        
        if (activeId) {
            const activeElement = document.getElementById(activeId);
            if (activeElement) {
                // Hapus warna default dari semua link (gray-500)
                // Tambahkan warna aktif (text-[#00a6a6])
                activeElement.classList.remove('text-gray-500');
                activeElement.classList.add('text-[#00a6a6]');
                // Opsional: tambah font-bold
                activeElement.querySelector('span').classList.add('font-bold');
            }
        }
    }

    // Jalankan fungsi saat halaman dimuat
    window.onload = setActiveMenu;
</script>
