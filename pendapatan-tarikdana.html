<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxi Ecosystem - Tarik Dana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="h-screen w-screen bg-white font-sans text-slate-900">

    <div id="pageMain" class="page active w-full h-full bg-gray-50 overflow-y-auto">
        <header class="sticky top-0 bg-white px-4 py-4 flex items-center justify-between shadow-sm">
            <button class="w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-full"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">Penarikan Dana</h1>
            <div class="w-10"></div>
        </header>
        <main class="p-5">
            <div class="bg-gradient-to-br from-[#00A5A6] to-[#00a6a6] rounded-2xl p-6 text-white mb-6">
                <p class="text-indigo-100 text-sm">Saldo yang bisa dicairkan</p>
                <h2 class="text-3xl font-bold">Rp. 650.000</h2>
            </div>
            
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-6">
                <label class="text-xs font-bold text-gray-400 uppercase">Jumlah Penarikan</label>
                <div class="flex items-center border-b-2 py-2">
                    <span class="text-3xl font-bold mr-2">Rp</span>
                    <input type="number" id="amountInput" value="650000" class="w-full text-3xl font-bold outline-none bg-transparent">
                    <button id="maxBtn" class="bg-indigo-50 text-[#015a5a] px-3 py-1.5 rounded-full text-sm font-bold">Max</button>
                </div>
            </div>

            <button onclick="showPage('pageMethod')" class="w-full p-4 bg-white rounded-xl border-2 border-dashed border-[#00A5A6] text-[#00A5A6] font-bold">
                + Tambahkan Metode Penarikan
            </button>
        </main>
    </div>

    <div id="pageMethod" class="page w-full h-full bg-gray-50 overflow-y-auto">
        <header class="sticky top-0 bg-white px-4 py-4 flex items-center shadow-sm">
            <button onclick="showPage('pageMain')" class="mr-4"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">Metode Penarikan</h1>
        </header>
        <main class="p-5">
            <div class="bg-gray-100 rounded-2xl p-6 text-center shadow-sm mb-6">
                <button onclick="showPage('pageInfo')" class="w-14 h-14 bg-[#00a6a6] rounded-full mx-auto flex items-center justify-center text-white mb-3">
                    <i class="fa-solid fa-plus text-xl"></i>
                </button>
                <p class="font-bold">Tambahkan Kartu Bank</p>
            </div>
            <div class="bg-gray-100 rounded-2xl p-6 text-center shadow-sm">
                <button onclick="showPage('pageInfo')" class="w-14 h-14 bg-[#00a6a6] rounded-full mx-auto flex items-center justify-center text-white mb-3">
                    <i class="fa-solid fa-plus text-xl"></i>
                </button>
                <p class="font-bold">Tambahkan E-wallet</p>
            </div>
        </main>
    </div>

    <div id="pageInfo" class="page w-full h-full bg-gray-50 overflow-y-auto">
        <header class="sticky top-0 bg-white px-4 py-4 flex items-center shadow-sm">
            <button onclick="showPage('pageMethod')" class="mr-4"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">Informasi Akun</h1>
        </header>
        <main class="p-5">
            <form class="space-y-5" onsubmit="event.preventDefault();">
                <div>
                    <label class="block font-semibold text-gray-700 ml-1 mb-1.5">Nama</label>
                    <input type="text" placeholder="Nama Anda" class="w-full bg-gray-50 border p-3.5 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block font-semibold text-gray-700 ml-1 mb-1.5">Nama Bank</label>
                    <button class="w-full bg-gray-50 border p-4 rounded-xl flex items-center justify-between px-4">
                        <span>Pilihan Bank</span><i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
                <div>
                    <label class="block font-semibold text-gray-700 ml-1 mb-1.5">Nomor Rekening</label>
                    <input type="text" placeholder="Nomor Rekening" class="w-full bg-gray-50 border p-3.5 rounded-xl outline-none">
                </div>
                <button class="w-full bg-[#00A5A6] text-white py-4 rounded-xl font-bold">Simpan Akun</button>
            </form>
        </main>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        document.getElementById('maxBtn').addEventListener('click', () => {
            document.getElementById('amountInput').value = 650000;
        });
    </script>
</body>
</html>
