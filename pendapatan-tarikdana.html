<html lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Penarikan Dana - Maxi Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-screen w-screen overflow-hidden bg-white font-sans text-slate-900">

    <div id="pageMain" class="w-full h-full bg-gray-50 overflow-y-auto relative">
        <header class="sticky top-0 z-20 bg-white px-4 py-[0.5rem] flex items-center justify-between shadow-sm">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 text-slate-600 transition-colors">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <h1 class="text-lg font-bold text-slate-800">Penarikan Dana</h1>
            <button class="w-[3.8rem] h-[1.5rem] flex items-center justify-center rounded-full hover:bg-gray-100 text-slate-600 transition-colors">
                <h1 class="text-[.8rem] font-semibold text-gray-900">History</h1>
            </button>
        </header>

        <main class="p-5 pb-32">
            <div class="bg-gradient-to-br from-[#00A5A6] to-[#00a6a6] rounded-2xl p-6 text-white shadow-lg mb-6 relative">
                <p class="text-indigo-100 text-sm font-medium">Saldo yang bisa dicairkan</p>
                <h2 id="totalSaldoText" class="text-3xl font-bold">Rp. 650.000</h2>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-6">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Jumlah Penarikan</label>
                <div class="relative flex items-center border-b-2 border-indigo-100 py-2">
                    <span class="text-3xl font-bold text-slate-800 mr-2">Rp</span>
                    <input type="number" id="amountInput" value="650000" class="w-full text-3xl font-bold outline-none bg-transparent">
                    <button type="button" id="maxBtn" class="text-[#015a5a] font-semibold text-sm bg-indigo-50 px-3 py-1.5 rounded-full">Max</button>
                </div>
            </div>

            <div class="mb-6">
                <div class="flex justify-between items-end mb-3">
                    <label class="text-sm font-bold text-slate-800">Akun Penarikan</label>
                    <button onclick="showPage('pageAdd')" class="text-xs font-semibold text-[#032c2c]">Add New</button>
                </div>
                <div class="p-4 bg-white border-2 border-[#00A5A6] rounded-xl flex items-center">
                    <i class="fa-solid fa-building-columns text-[#00A5A6] mr-4"></i>
                    <div><p class="font-bold text-sm">DANA</p><p class="text-xs text-gray-500">6288***8949</p></div>
                </div>
            </div>
        </main>
    </div>

    <div id="pageAdd" class="hidden w-full h-full bg-gray-50 overflow-y-auto absolute top-0 left-0 z-50">
        <header class="sticky top-0 bg-white px-4 py-4 flex items-center shadow-sm">
            <button onclick="showPage('pageMain')" class="w-10 h-10 hover:bg-gray-100 rounded-full"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="ml-4 text-lg font-bold">Metode Penarikan</h1>
        </header>
        <main class="p-5">
            <div class="w-full bg-white rounded-2xl p-6 border mb-6 text-center shadow-sm">
                <button class="w-14 h-14 bg-[#00a6a6] rounded-full mx-auto flex items-center justify-center text-white mb-3">
                    <i class="fa-solid fa-plus text-xl"></i>
                </button>
                <span class="font-bold text-gray-800">Tambahkan Kartu Bank</span>
                <div class="text-xs text-gray-500 mt-2">BCA, BNI, BRI, MANDIRI</div>
            </div>
            <div class="w-full bg-white rounded-2xl p-6 border text-center shadow-sm">
                <button class="w-14 h-14 bg-[#00a6a6] rounded-full mx-auto flex items-center justify-center text-white mb-3">
                    <i class="fa-solid fa-plus text-xl"></i>
                </button>
                <span class="font-bold text-gray-800">Tambahkan E-wallet</span>
                <div class="text-xs text-gray-500 mt-2">DANA, OVO, GOPAY</div>
            </div>
        </main>
    </div>

    <script>
        function showPage(pageId) {
            document.getElementById('pageMain').classList.toggle('hidden', pageId === 'pageAdd');
            document.getElementById('pageAdd').classList.toggle('hidden', pageId === 'pageMain');
        }

        document.getElementById('maxBtn').addEventListener('click', () => {
            document.getElementById('amountInput').value = 650000;
        });
    </script>
</body>
</html>
