<html lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Penarikan Dana - Maxi Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="h-screen w-screen overflow-hidden bg-white font-sans text-slate-900">

    <div id="pageMain" class="w-full h-full bg-gray-50 overflow-y-auto relative">
        <header class="sticky top-0 z-20 bg-white px-4 py-3 flex items-center shadow-sm">
            <h1 class="text-lg font-bold">Penarikan Dana</h1>
        </header>

        <main class="p-5 pb-48">
            <div class="bg-gradient-to-br from-[#00A5A6] to-[#00a6a6] rounded-2xl p-6 text-white mb-6">
                <p class="text-indigo-100 text-sm">Saldo yang bisa dicairkan</p>
                <h2 class="text-3xl font-bold">Rp. 650.000</h2>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-6">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Jumlah Penarikan</label>
                <div class="relative flex items-center border-b-2 border-indigo-100 py-2">
                    <span class="text-3xl font-bold text-slate-800 mr-2">Rp</span>
                    <input type="number" id="amountInput" value="650000" class="w-full text-3xl font-bold outline-none bg-transparent">
                    <button type="button" id="maxBtn" class="text-[#015a5a] font-semibold text-sm bg-indigo-50 px-3 py-1.5 rounded-full">Max</button>
                </div>
            </div>

            <div class="mb-6">
                <button onclick="showPage('pageAdd')" class="w-full text-xs font-bold text-[#032c2c] bg-white p-3 rounded-lg border shadow-sm">Tambah Metode Penarikan</button>
            </div>
        </main>

        <div class="fixed bottom-0 left-0 w-full bg-white border-t p-5 shadow-lg z-30">
            <div class="space-y-2 mb-5">
                <div class="flex justify-between text-sm"><span>Biaya Adm</span><span>Rp. 6.500</span></div>
                <div class="flex justify-between text-base font-bold">
                    <span>Total Penarikan</span>
                    <span id="totalDisplay">Rp. 656.500</span>
                </div>
            </div>
            <button class="w-full bg-[#00A5A6] text-white font-bold py-4 rounded-xl">Tarik Dana</button>
        </div>
    </div>

    <div id="pageAdd" class="hidden w-full h-full bg-gray-50 overflow-y-auto absolute top-0 left-0 z-50">
        <header class="sticky top-0 bg-white px-4 py-4 flex items-center shadow-sm">
            <button onclick="showPage('pageMain')" class="mr-4"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">Metode Penarikan</h1>
        </header>
        <main class="p-5">
            <div class="bg-gray-100 rounded-2xl p-6 text-center shadow-sm">
                <p class="font-bold">Tambahkan Kartu Bank/E-Wallet</p>
                <button class="mt-4 bg-[#00a6a6] text-white px-6 py-2 rounded-full">Tambah</button>
            </div>
        </main>
    </div>

    <script>
        function updateTotal() {
            const adminFee = 6500;
            const inputAmount = parseFloat(document.getElementById('amountInput').value) || 0;
            const total = inputAmount + adminFee;
            document.getElementById('totalDisplay').innerText = "Rp. " + total.toLocaleString('id-ID');
        }

        document.getElementById('amountInput').addEventListener('input', updateTotal);
        document.getElementById('maxBtn').addEventListener('click', () => {
            document.getElementById('amountInput').value = 650000;
            updateTotal();
        });

        function showPage(pageId) {
            document.getElementById('pageMain').classList.toggle('hidden', pageId === 'pageAdd');
            document.getElementById('pageAdd').classList.toggle('hidden', pageId === 'pageMain');
        }
    </script>
</body>
</html>
