<html lang="id"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Penarikan Dana - Maxi Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        body { font-family: 'Inter', sans-serif; }
        /* Tambahkan untuk animasi popup */
        .popup-overlay { display: none; }
        .popup-overlay.active { display: flex; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-white">

    <div id="pageInfoBank" class="page w-full h-full bg-gray-50 overflow-y-auto">
        <header class="sticky top-0 bg-white px-4 py-4 flex items-center shadow-sm">
            <button onclick="showPage('pageMethod')" class="mr-4"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">Informasi Bank</h1>
        </header>
        <main class="p-5">
            <form class="space-y-5">
                <div>
                    <label class="block text-[1rem] font-semibold text-gray-700 tracking-wider ml-1 mb-1.5">Nama</label>
                    <input type="text" placeholder="Nama Anda" class="pl-[1rem] w-full bg-gray-50 border border-gray-200 text-gray-900 text-[1rem] rounded-xl focus:ring-2 focus:ring-[#00A5A6]/20 focus:border-[#00A5A6] block p-3.5 outline-none transition-all placeholder-gray-400">
                </div>
                <div>
                    <label class="block text-[1rem] font-semibold text-gray-700 tracking-wider ml-1 mb-[-0.5rem]">Nama Bank</label>
                    <button type="button" onclick="openBankPopup()" class="w-full bg-gray-50 border border-gray-200 text-gray-400 font-regular py-4 rounded-xl transition-all focus:ring-2 focus:ring-[#00A5A6]/20 focus:border-[#00A5A6] transform active:scale-[0.98] mt-4 flex items-center justify-between px-4">
                        <span id="bankNameDisplay">Pilihan Bank</span>
                        <i class="text-gray-400 fa-solid fa-arrow-right text-sm"></i>
                    </button>
                </div>
                </form>
        </main>
    </div>

    <div id="bankPopup" class="popup-overlay fixed inset-0 z-50 items-end bg-gray-900/50">
        <div class="w-full bg-white rounded-t-[2rem] p-6 animate-slide-up">
            <h2 class="text-lg font-bold mb-4">Pilih Bank</h2>
            <div class="space-y-3 mb-6">
                <label class="flex items-center p-4 border rounded-xl cursor-pointer">
                    <input type="radio" name="bank" value="BCA" class="mr-3"> BCA
                </label>
                <label class="flex items-center p-4 border rounded-xl cursor-pointer">
                    <input type="radio" name="bank" value="BNI" class="mr-3"> BNI
                </label>
            </div>
            <button onclick="confirmBank()" class="w-full bg-[#00a6a6] text-white py-4 rounded-xl font-bold">Konfirmasi</button>
        </div>
    </div>

    <script>
        function openBankPopup() { document.getElementById('bankPopup').classList.add('active'); }
        
        function confirmBank() {
            const selected = document.querySelector('input[name="bank"]:checked');
            if (selected) {
                document.getElementById('bankNameDisplay').innerText = selected.value;
                document.getElementById('bankNameDisplay').classList.remove('text-gray-400');
                document.getElementById('bankNameDisplay').classList.add('text-gray-900');
                document.getElementById('bankPopup').classList.remove('active');
            } else {
                alert("Pilih bank terlebih dahulu!");
            }
        }
        // ... fungsi showPage dan lainnya tetap sama
    </script>
</body></html>
