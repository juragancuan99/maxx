	<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; } 
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animasi Zoom In untuk Pop-Up Modal Info */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .zoom-in { animation: zoomIn 0.2s ease-out forwards; }
    </style>
	
	  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

    <!-- EFEK TEXT ANIMASI -->
    <style>
        /* Fade In */
        .fade-in {
            animation: fadeIn 2s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Bounce */
        .bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        /* Flip */
        .flip {
            animation: flip 1s ease-in-out forwards;
        }

        @keyframes flip {
            from { transform: perspective(400px) rotateY(0deg); }
            to { transform: perspective(400px) rotateY(180deg); }
        }

        /* Heartbeat */
        .heartbeat {
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        /* Zoom In */
        .zoom-in {
            animation: zoomIn 0.3s ease forwards;
            transform: scale(0);
        }

        @keyframes zoomIn {
            to { transform: scale(1); }
        }

        /* Slide fade antar tampilan (ranking <-> pemenang) */
        .view-fade {
            animation: viewFadeIn 0.25s ease forwards;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <!-- Custom Styles for Confetti Animation -->
    <style>
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #FFD700;
            animation: fall 4s linear infinite;
            opacity: 0;
        }
        .confetti:nth-child(odd) { background-color: #FFF; }
        .confetti:nth-child(2n) { animation-duration: 3.5s; animation-delay: 0.5s; }
        .confetti:nth-child(3n) { animation-duration: 4.2s; animation-delay: 1.2s; left: 20%; }
        .confetti:nth-child(4n) { animation-duration: 3.8s; animation-delay: 2.5s; left: 80%; }
        .confetti:nth-child(5n) { animation-duration: 4.5s; animation-delay: 0.8s; left: 50%; }
    </style>

        tailwind.config = {

    <script>
        // ---- Tab Daily / Weekly / Top Final (tampilan Ranking) ----
        function switchTab(tab) {
            var buttons = {
                daily: document.getElementById('tabDailyBtn'),
                weekly: document.getElementById('tabWeeklyBtn'),
                final: document.getElementById('tabFinalBtn')
            };
            var activeClasses = ['font-bold', 'text-slate-900', 'bg-[#FFD700]', 'shadow-lg', 'shadow-yellow-500/20'];
            var inactiveClasses = ['font-medium', 'text-gray-400'];

            Object.keys(buttons).forEach(function (key) {
                var btn = buttons[key];
                if (!btn) return;
                if (key === tab) {
                    btn.classList.remove(...inactiveClasses);
                    btn.classList.add(...activeClasses);
                } else {
                    btn.classList.remove(...activeClasses);
                    btn.classList.add(...inactiveClasses);
                }
            });
        }

        // ---- Dropdown custom "100K Ke X" (tampilan Pemenang) ----
        function toggleSponsorDropdown() {
            document.getElementById('sponsorDropdownMenu').classList.toggle('hidden');
            document.getElementById('sponsorDropdownIcon').classList.toggle('rotate-180');
        }

        function selectSponsorOption(el) {
            document.getElementById('sponsorDropdownLabel').textContent = el.textContent;
            document.getElementById('sponsorDropdownMenu').classList.add('hidden');
            document.getElementById('sponsorDropdownIcon').classList.remove('rotate-180');
            highlightPemenangOption(el.textContent);
        }

        document.addEventListener('click', function (event) {
            var wrapper = document.getElementById('sponsorDropdownBtn');
            var menu = document.getElementById('sponsorDropdownMenu');
            if (!wrapper || !menu) return;
            if (!wrapper.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.add('hidden');
                document.getElementById('sponsorDropdownIcon').classList.remove('rotate-180');
            }
        });

        // ---- Penghubung antara tampilan Ranking (select) & tampilan Pemenang (dropdown) ----

        // Dipanggil saat <select> "Nominasi MP 100K ke X" di halaman Ranking diubah
        function handleRankingTierChange(selectEl) {
            var ke = selectEl.selectedIndex + 1; // 1 - 10
            var label = 'Nominasi MP 100K ke ' + ke;
            goToPemenangView(label, ke);
        }

        // Dipanggil saat salah satu opsi dropdown 100K di halaman Pemenang dipilih
        function highlightPemenangOption(labelText) {
            var subtitle = document.getElementById('pemenangSubtitle');
            if (subtitle) {
                subtitle.textContent = 'Daftar pemenang ' + labelText;
            }
        }

        function goToPemenangView(labelText, ke) {
            document.getElementById('viewRanking').classList.add('hidden');
            var viewPemenang = document.getElementById('viewPemenang');
            viewPemenang.classList.remove('hidden');
            viewPemenang.classList.add('view-fade');

            document.getElementById('sponsorDropdownLabel').textContent = '100K Ke ' + ke + ' ( Omset Nasional Maxipoin )';
            document.getElementById('pemenangSubtitle').textContent = 'Daftar pemenang ' + labelText;

            // Tandai opsi yang sesuai di dropdown menu pemenang (opsional, untuk highlight)
            var options = document.querySelectorAll('#sponsorDropdownMenu button');
            options.forEach(function (opt, idx) {
                if (idx === ke - 1) {
                    opt.classList.add('bg-white/10', 'text-[#FFD700]');
                } else {
                    opt.classList.remove('bg-white/10', 'text-[#FFD700]');
                }
            });
        }

        function backToRankingView() {
            document.getElementById('viewPemenang').classList.add('hidden');
            var viewRanking = document.getElementById('viewRanking');
            viewRanking.classList.remove('hidden');
            viewRanking.classList.add('view-fade');
        }
    </script>

</head>

<script>
    // Fungsi untuk menandai menu aktif
    function setActiveMenu() {
        // Ambil nama file dari URL (contoh: 'misireward.html')
        const path = window.location.pathname.split("/").pop() || 'index.html';
        
        // Pemetaan path ke ID menu
        const menuMap = {
            'index.html': 'nav-beranda',
            'misireward.html': 'nav-misi',
            'team.html': 'nav-team',
            'pendapatan.html': 'nav-pendapatan',
            'saya.html': 'nav-saya'
        };

        const activeId = menuMap[path];
        
        if (activeId) {
            const activeElement = document.getElementById(activeId);
            if (activeElement) {
                // Hapus warna default dari semua link (gray-500)
                // Tambahkan warna aktif (text-[#00a6a6])
                activeElement.classList.remove('text-gray-500');
                activeElement.classList.add('text-[#00a6a6]');
                // Opsional: tambah font-bold
                activeElement.querySelector('span').classList.add('font-bold');
            }
        }
    }

    // Jalankan fungsi segera (script ini ada di akhir <body>, jadi elemen nav sudah ada di DOM)
    // supaya warna aktif langsung muncul tanpa menunggu semua gambar selesai dimuat
    setActiveMenu();

    // Fallback: jalankan lagi saat halaman selesai dimuat sepenuhnya
    window.onload = setActiveMenu;
</script>
