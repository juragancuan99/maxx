    <script>
        const AREA_API_BASE = 'https://emsifa.github.io/api-wilayah-indonesia/api';

        // level: 0=provinsi, 1=kabupaten/kota, 2=kecamatan, 3=kelurahan/desa
        let areaLevel = 0;
        let areaSelection = { provinsi: null, kabkota: null, kecamatan: null, kelurahan: null };
        let areaCurrentList = []; // list mentah dari API untuk level aktif

        const areaLevelTitle = ['Pilih Provinsi', 'Pilih Kabupaten/Kota', 'Pilih Kecamatan', 'Pilih Kelurahan/Desa'];

        function openAreaModal() {
            const overlay = document.getElementById('areaModalOverlay');
            const sheet = document.getElementById('areaModalSheet');
            overlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                sheet.classList.remove('translate-y-full');
            });

            // reset ke level provinsi setiap kali dibuka
            areaLevel = 0;
            areaSelection = { provinsi: null, kabkota: null, kecamatan: null, kelurahan: null };
            updateAreaHeader();
            loadAreaList();
        }

        function closeAreaModal() {
            const overlay = document.getElementById('areaModalOverlay');
            const sheet = document.getElementById('areaModalSheet');
            sheet.classList.add('translate-y-full');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function updateAreaHeader() {
            document.getElementById('areaModalTitle').textContent = areaLevelTitle[areaLevel];
            document.getElementById('areaBackBtn').classList.toggle('hidden', areaLevel === 0);
            document.getElementById('areaSearchInput').value = '';
        }

        async function loadAreaList() {
            const container = document.getElementById('areaListContainer');
            container.innerHTML = '<div class="flex justify-center py-10 text-gray-400 text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Memuat data...</div>';

            let url = '';
            if (areaLevel === 0) {
                url = `${AREA_API_BASE}/provinces.json`;
            } else if (areaLevel === 1) {
                url = `${AREA_API_BASE}/regencies/${areaSelection.provinsi.id}.json`;
            } else if (areaLevel === 2) {
                url = `${AREA_API_BASE}/districts/${areaSelection.kabkota.id}.json`;
            } else if (areaLevel === 3) {
                url = `${AREA_API_BASE}/villages/${areaSelection.kecamatan.id}.json`;
            }

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Gagal memuat data');
                const data = await res.json();
                areaCurrentList = data;
                renderAreaList(data);
            } catch (err) {
                container.innerHTML = '<div class="text-center py-10 text-red-400 text-sm">Gagal memuat data. Periksa koneksi internet Anda.<br><button onclick="loadAreaList()" class="mt-3 text-[#00a6a6] font-semibold underline">Coba lagi</button></div>';
            }
        }

        function renderAreaList(list) {
            const container = document.getElementById('areaListContainer');
            if (!list || list.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">Data tidak ditemukan.</div>';
                return;
            }
            container.innerHTML = '';
            list.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'area-item w-full text-left px-4 py-3.5 rounded-xl border border-gray-200 hover:bg-gray-50 active:bg-gray-100 transition flex items-center justify-between';
                btn.dataset.name = item.name.toLowerCase();
                btn.innerHTML = `<span class="text-gray-700 font-medium text-sm">${item.name}</span><i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>`;
                btn.onclick = () => selectAreaItem(item);
                container.appendChild(btn);
            });
        }

        function areaFilterList() {
            const q = document.getElementById('areaSearchInput').value.trim().toLowerCase();
            document.querySelectorAll('#areaListContainer .area-item').forEach(el => {
                el.classList.toggle('hidden', !el.dataset.name.includes(q));
            });
        }

        function selectAreaItem(item) {
            if (areaLevel === 0) {
                areaSelection.provinsi = item;
                areaLevel = 1;
            } else if (areaLevel === 1) {
                areaSelection.kabkota = item;
                areaLevel = 2;
            } else if (areaLevel === 2) {
                areaSelection.kecamatan = item;
                areaLevel = 3;
            } else if (areaLevel === 3) {
                areaSelection.kelurahan = item;
                finishAreaSelection();
                return;
            }
            updateAreaHeader();
            loadAreaList();
        }

        function areaGoBack() {
            if (areaLevel === 0) return;
            areaLevel -= 1;
            updateAreaHeader();
            loadAreaList();
        }

        function finishAreaSelection() {
            const teks = `${areaSelection.kelurahan.name}, ${areaSelection.kecamatan.name}, ${areaSelection.kabkota.name}, ${areaSelection.provinsi.name}`;
            const label = document.getElementById('areaSelectedLabel');
            label.textContent = teks;
            label.classList.remove('text-gray-400');
            label.classList.add('text-gray-800', 'font-medium');
            closeAreaModal();
        }
    </script>

    <script>
        function openCountryModal() {
            const overlay = document.getElementById('countryModalOverlay');
            const sheet = document.getElementById('countryModalSheet');
            overlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                sheet.classList.remove('translate-y-full');
            });
            syncCountryRadioVisuals();
        }

        function syncCountryRadioVisuals() {
            document.querySelectorAll('#countryForm input[name="country_select"]').forEach(radio => {
                const label = radio.closest('label');
                const circle = label.querySelector('.country-radio-circle');
                const check = label.querySelector('.country-radio-check');
                const nameSpan = label.querySelector('span.font-semibold');

                if (radio.checked) {
                    circle.classList.remove('border-gray-300');
                    circle.classList.add('border-[#4F46E5]', 'bg-[#4F46E5]');
                    check.classList.remove('opacity-0', 'scale-0');
                    check.classList.add('opacity-100', 'scale-100');
                    if (nameSpan) nameSpan.classList.add('text-[#4F46E5]');
                } else {
                    circle.classList.add('border-gray-300');
                    circle.classList.remove('border-[#4F46E5]', 'bg-[#4F46E5]');
                    check.classList.add('opacity-0', 'scale-0');
                    check.classList.remove('opacity-100', 'scale-100');
                    if (nameSpan) nameSpan.classList.remove('text-[#4F46E5]');
                }
            });
        }

        document.querySelectorAll('#countryForm input[name="country_select"]').forEach(radio => {
            radio.addEventListener('change', syncCountryRadioVisuals);
        });
        syncCountryRadioVisuals();

        function closeCountryModal() {
            const overlay = document.getElementById('countryModalOverlay');
            const sheet = document.getElementById('countryModalSheet');
            sheet.classList.add('translate-y-full');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        function confirmCountry() {
            const checked = document.querySelector('#countryForm input[name="country_select"]:checked');
            if (!checked) {
                closeCountryModal();
                return;
            }
            const flagUrl = checked.getAttribute('data-flag');
            const countryName = checked.value;

            // Otomatis ganti icon bendera & label sesuai negara yang dipilih
            document.getElementById('countryFlagIcon').src = flagUrl;
            document.getElementById('countryNameLabel').textContent = countryName;

            closeCountryModal();
        }
    </script>

    <script>
        function openPhotoModal() {
            const overlay = document.getElementById('photoModalOverlay');
            const sheet = document.getElementById('photoModalSheet');
            const current = document.getElementById('profilePhotoImg').src;
            document.getElementById('photoModalPreview').src = current;

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            // beri jeda 1 frame agar transisi animasi jalan
            requestAnimationFrame(() => {
                sheet.classList.remove('translate-y-full', 'sm:scale-95', 'sm:opacity-0');
            });
        }

        function closePhotoModal() {
            const overlay = document.getElementById('photoModalOverlay');
            const sheet = document.getElementById('photoModalSheet');
            sheet.classList.add('translate-y-full', 'sm:scale-95', 'sm:opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }, 300);
        }

        function triggerGallery() {
            document.getElementById('galleryInput').click();
        }

        function triggerCamera() {
            document.getElementById('cameraInput').click();
        }

        function handlePhotoSelected(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('File yang dipilih bukan gambar.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const dataUrl = e.target.result;
                document.getElementById('profilePhotoImg').src = dataUrl;
                document.getElementById('photoModalPreview').src = dataUrl;
                closePhotoModal();
            };
            reader.readAsDataURL(file);

            // reset value supaya bisa pilih file yang sama lagi di lain waktu
            event.target.value = '';
        }
    </script>
