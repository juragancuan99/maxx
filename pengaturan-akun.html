    <!-- Input file tersembunyi -->
    <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handlePhotoSelected(event)">
    <input type="file" id="cameraInput" accept="image/*" capture="user" class="hidden" onchange="handlePhotoSelected(event)">

    <script>
        function openPhotoModal() {
            const overlay = document.getElementById('photoModalOverlay');
            const sheet = document.getElementById('photoModalSheet');
            const current = document.getElementById('profilePhotoImg').src;
            document.getElementById('photoModalPreview').src = current;

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            // beri jeda 1 frame agar transisi animasi jalan
            requestAnimationFrame(() => {
                sheet.classList.remove('translate-y-full', 'sm:scale-95', 'sm:opacity-0');
            });
        }

        function closePhotoModal() {
            const overlay = document.getElementById('photoModalOverlay');
            const sheet = document.getElementById('photoModalSheet');
            sheet.classList.add('translate-y-full', 'sm:scale-95', 'sm:opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }, 300);
        }

        function triggerGallery() {
            document.getElementById('galleryInput').click();
        }

        function triggerCamera() {
            document.getElementById('cameraInput').click();
        }

        function handlePhotoSelected(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('File yang dipilih bukan gambar.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const dataUrl = e.target.result;
                document.getElementById('profilePhotoImg').src = dataUrl;
                document.getElementById('photoModalPreview').src = dataUrl;
                closePhotoModal();
            };
            reader.readAsDataURL(file);

            // reset value supaya bisa pilih file yang sama lagi di lain waktu
            event.target.value = '';
        }
    </script>
