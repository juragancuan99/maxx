<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Lacak Pesanan</title>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="w-full max-w-md h-screen bg-white shadow-xl flex flex-col p-6 overflow-y-auto">

        <!-- Header -->
        <div class="flex items-center gap-3 mb-8">
            <button onclick="window.history.back()" class="text-gray-600 hover:text-gray-800 p-1">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-xl font-bold text-gray-800">Lacak Pesanan</h1>
        </div>

        <!-- Timeline -->
        <div class="relative pl-6 border-l-2 border-gray-200 space-y-10">

            <!-- Pembayaran -->
            <div class="relative">
                <div class="absolute -left-[18px] top-0 bg-white">
                    <i class="fas fa-check-circle text-green-500 text-2xl"></i>
                </div>
                <h4 class="text-sm font-bold text-gray-800">
                    Pembayaran Diterima
                </h4>
                <p class="text-xs text-gray-400 mt-1">
                    17 Jun 2026, 22:31
                </p>
            </div>

            <!-- Diproses -->
            <div class="relative">
                <div class="absolute -left-[18px] top-0 bg-white">
                    <i class="fas fa-check-circle text-green-500 text-2xl"></i>
                </div>
                <h4 class="text-sm font-bold text-gray-800">
                    Pesanan Diproses
                </h4>
                <p class="text-xs text-gray-400 mt-1">
                    17 Jun 2026, 22:35
                </p>
            </div>

            <!-- Pengiriman -->
            <div class="relative">
                <div class="absolute -left-[18px] top-0 w-8 h-8 bg-[#FF5722] rounded-full flex items-center justify-center animate-pulse shadow-lg">
                    <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                </div>

                <h4 class="text-sm font-bold text-[#FF5722]">
                    Dalam Pengiriman
                </h4>

                <p class="text-xs text-gray-500 mt-1">
                    Kurir sedang menuju lokasi Anda.
                </p>
            </div>

            <!-- Selesai -->
            <div class="relative">
                <div class="absolute -left-[18px] top-0">
                    <i class="far fa-circle text-gray-300 text-2xl"></i>
                </div>

                <h4 class="text-sm font-bold text-gray-400">
                    Selesai
                </h4>
            </div>

        </div>

        <!-- Estimasi -->
        <div class="mt-10 bg-gray-50 p-4 rounded-xl border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">
                Estimasi Tiba
            </p>

            <p class="font-bold text-gray-800">
                18 Jun 2026, 14:00 - 17:00
            </p>
        </div>

        <!-- Button -->
        <div class="mt-auto pt-6">
            <button onclick="window.location.href='index.html'"
                class="w-full bg-[#FF5722] text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-orange-500/10">
                Kembali ke Beranda
            </button>
        </div>

    </div>

</body>
</html>
