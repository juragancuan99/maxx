<html lang="id"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="w-full max-w-md h-screen bg-white shadow-xl flex flex-col">
        <header class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white z-10">
            <button onclick="history.back()" class="text-gray-600 hover:text-black">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="font-bold text-lg">Pilih Metode Pembayaran</h1>
        </header>

        <div class="p-4 flex-1 overflow-y-auto">
            <div class="bg-gray-50 p-4 rounded-xl mb-6">
                <p class="text-sm text-gray-500">Total Pembayaran</p>
                <p class="text-2xl font-bold text-[#FF5722]">Rp9.000</p>
            </div>

            <h2 class="font-semibold mb-3">Transfer Bank</h2>
            <div class="space-y-3">
                <div class="flex items-center p-3 border rounded-lg hover:border-orange-500 cursor-pointer bg-white">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" alt="BCA Logo" class="h-5 w-16 object-contain mr-3">
                    <span class="text-sm font-medium text-gray-700">Bank BCA</span>
                </div>
                <div class="flex items-center p-3 border rounded-lg hover:border-orange-500 cursor-pointer bg-white">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/Bank_Mandiri_logo_2016.svg" alt="Mandiri Logo" class="h-5 w-16 object-contain mr-3">
                    <span class="text-sm font-medium text-gray-700">Bank Mandiri</span>
                </div>
            </div>

            <h2 class="font-semibold mt-6 mb-3">E-Wallet &amp; QRIS</h2>
            <div class="space-y-3">
                <div class="flex items-center p-3 border rounded-lg hover:border-orange-500 cursor-pointer bg-white">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg" alt="QRIS Logo" class="h-5 w-16 object-contain mr-3">
                    <span class="text-sm font-medium text-gray-700">QRIS</span>
                </div>
                <div class="flex items-center p-3 border rounded-lg hover:border-orange-500 cursor-pointer bg-white">
    <div class="flex items-center justify-start gap-2 min-w-[70px] mr-3">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" alt="Dana" class="h-3.5 w-auto object-contain">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" alt="GoPay" class="h-3 w-auto object-contain">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo_ovo_purple.svg" alt="OVO" class="h-3 w-auto object-contain scale-125 origin-left">
    </div>
    <span class="text-sm font-medium text-gray-700">Dana / GoPay / OVO</span>
</div>
            </div>
        </div>

        <div class="p-4 border-t bg-white">
            <button class="w-full bg-[#FF5722] text-white font-bold py-3.5 rounded-xl transition-all transform active:scale-95 shadow-lg">Bayar Sekarang</button>
        </div>
    </div>

</body></html>
